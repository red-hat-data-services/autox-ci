suite: base

pipeline:
  mode: managed

run:
  optimization_metric: "faithfulness"
  optimization_max_rag_patterns: 8
  poll_interval_seconds: 30
  timeout_seconds: 86400
  enable_caching: false
  run_name_prefix: "rag-benchmark-base"

# Reference the dataset manifest file
dataset_manifest_path: "dataset_manifest_autorag_base.yaml"
